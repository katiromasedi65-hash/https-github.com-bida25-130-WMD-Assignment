<!DOCTYPE html> 

<html lang="en"> 

<head> 

    <meta charset="UTF-8"> 

    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Book a service now</title>
 <style>
        body {
            display: flex;
            justify-content:left;
            align-items: left;
            height: 100vh;
            margin-left: 50px;
            background-color: #e7eae7;
        }
        form {
            width: 400px;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        fieldset {
            border: 1px solid black;
            padding: 10px;
            margin: 0;
        }
        legend {
            font-weight: bold;
            margin-bottom: 10px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="text"],
        input[type="email"],
        input[type="date"] {
            width: calc(100% - 20px);
            padding: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .gender-group {
            margin-bottom: 10px;
        }
        .gender-group label {
            display: inline-block;
            margin-left: 10px;
        }
        input[type="radio"] {
            margin-left: 10px;
            vertical-align: middle;
        }
        input[type="submit"] {
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        footer{
            bottom: 0;
        }
        

    </style>
</head>

<body> 

    <header> 

        <h1>Book Now</h1>
        <nav> 

            <div class="read-aloud-bar">
  <span class="ra-dots">•••</span>
  <span class="ra-label">Read aloud</span>
  <div class="ra-controls">
    <button class="ra-btn" onclick="readPage()" title="Play">▶</button>
    <button class="ra-btn" onclick="pauseReading()" title="Pause">⏸</button>
    <button class="ra-btn" onclick="resumeReading()" title="Resume">⏭</button>
    <button class="ra-btn" onclick="stopReading()" title="Stop">✕</button>
  </div>
</div>

    


            <a href="index.html">Home</a> | 

            <a href="about.html">About</a> | 

            <a href="contact.html">Contact</a> 
            
            <a href="services.html">Services</a>
            
            <a href="booking.html">Booking</a>

            
        
       
       <main>
         <form onsubmit="confirmBooking(event)">
        <fieldset>
            <legend>User Personal Information</legend>
            <label for="name">Enter your full name:</label>
            <input type="text" id="name" name="name" required />
            <label for="email">Enter your email:</label>
            <input type="email" id="email" name="email" required />
            <label>Enter your gender:</label>
            <div class="gender-group">
                <input type="radio" name="gender" value="male" id="male" required />
                <label for="male">Male</label>
                <input type="radio" name="gender" value="female" id="female" />
                <label for="female">Female</label>
                <input type="radio" name="gender" value="others" id="others" />
                <label for="others">Others</label>
            </div>
            <label for="service-date">Enter the date for the service:</label>
            <input type="date" id="service-date" name="service-date" required />
            <label for="address">Enter your Address:</label>
            <textarea id="address" name="address" required></textarea>
            <label for="special instructions">Any special instructions:</label>
            <textarea id="instructions" name="instructions" rows="5"></textarea>
            <form onsubmit="confirmBooking(event)">
            <input type="submit" value="Submit" />
        </fieldset>
        
    </form>
    </main>

 <footer>
        <p>&copy; 2026 Ellah's Cleaning Services. All rights reserved</p>
        </footer>

        <script src="script.js"></script>

 </body>
    </html>
